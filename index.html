<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jarrah</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: #04040a;
      color: #e2e2ea;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; border-radius: 12px; }

    /* grid bg */
    .grid-bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 64px 64px;
    }

    /* glow orbs */
    .orb {
      position: fixed; border-radius: 50%;
      pointer-events: none; z-index: 0;
      filter: blur(80px); opacity: 0.35;
    }
    .orb1 { width: 500px; height: 500px; top: -100px; left: -100px; }
    .orb2 { width: 400px; height: 400px; bottom: -80px; right: -80px; }

    /* nav */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.1rem 3rem;
      background: rgba(4,4,10,0.75);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .nav-logo { font-size: 1rem; font-weight: 600; letter-spacing: -0.3px; }
    .nav-logo span { opacity: 0.4; }
    .nav-links { display: flex; gap: 2.5rem; font-size: 0.83rem; color: rgba(255,255,255,0.4); }
    .nav-links a:hover { color: #fff; transition: color 0.2s; }
    .nav-cta {
      padding: 0.45rem 1.1rem; border-radius: 8px;
      font-size: 0.82rem; font-weight: 500;
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.75);
      transition: background 0.2s, border-color 0.2s;
    }
    .nav-cta:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.2); }

    /* sections */
    section, .hero { position: relative; z-index: 1; }

    /* hero */
    .hero {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      padding: 8rem 2rem 4rem;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 0.35rem 1rem; border-radius: 99px;
      font-size: 0.75rem; font-weight: 500;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.55);
      margin-bottom: 2rem;
      opacity: 0; animation: fadeUp 0.6s 0.1s forwards;
    }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; }
    .hero h1 {
      font-size: clamp(2.8rem, 8vw, 6.5rem);
      font-weight: 700;
      letter-spacing: -3px;
      line-height: 1.05;
      margin-bottom: 1.5rem;
      opacity: 0; animation: fadeUp 0.6s 0.25s forwards;
    }
    .hero h1 .static { color: #fff; }
    .hero h1 .cycle-wrap {
      display: inline-block;
      position: relative;
      height: 1.1em;
      overflow: hidden;
      vertical-align: bottom;
      min-width: 2ch;
    }
    .cycle-word {
      display: block;
      position: absolute;
      left: 0; right: 0;
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.45s ease, transform 0.45s ease;
      text-align: center;
    }
    .cycle-word.active {
      opacity: 1;
      transform: translateY(0);
    }
    .cycle-word.exit {
      opacity: 0;
      transform: translateY(-40px);
    }
    .hero-sub {
      font-size: clamp(0.95rem, 2vw, 1.1rem);
      color: rgba(255,255,255,0.4);
      max-width: 520px;
      line-height: 1.7;
      margin-bottom: 2.5rem;
      opacity: 0; animation: fadeUp 0.6s 0.4s forwards;
    }
    .hero-btns {
      display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center;
      opacity: 0; animation: fadeUp 0.6s 0.55s forwards;
    }
    .btn {
      padding: 0.7rem 1.6rem; border-radius: 10px;
      font-size: 0.875rem; font-weight: 500;
      cursor: pointer; transition: all 0.2s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-primary { color: #fff; }
    .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-ghost {
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.6);
      background: transparent;
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.2); color: #fff; }

    /* images strip */
    .images-strip {
      opacity: 0; animation: fadeUp 0.6s 0.7s forwards;
      margin-top: 4rem;
      display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;
    }
    .strip-img {
      width: 280px; height: 180px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.07);
    }
    .strip-img-placeholder {
      width: 280px; height: 180px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.03);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; color: rgba(255,255,255,0.2);
    }

    /* divider */
    .divider {
      width: 100%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      position: relative; z-index: 1;
    }

    /* about section */
    .about {
      max-width: 900px; margin: 0 auto;
      padding: 7rem 2rem;
    }
    .section-label {
      font-size: 0.7rem; letter-spacing: 3px;
      text-transform: uppercase; font-weight: 500;
      margin-bottom: 1rem;
    }
    .about h2 {
      font-size: clamp(1.8rem, 4vw, 3rem);
      font-weight: 700; letter-spacing: -1.5px;
      line-height: 1.15; margin-bottom: 1.5rem; color: #fff;
    }
    .about-body {
      font-size: 1.05rem; color: rgba(255,255,255,0.45);
      max-width: 600px; line-height: 1.8;
    }
    .about-body strong { color: rgba(255,255,255,0.8); font-weight: 500; }

    /* feature cards */
    .features {
      max-width: 900px; margin: 0 auto;
      padding: 2rem 2rem 7rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1px;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      overflow: hidden;
      background: rgba(255,255,255,0.06);
    }
    .feat-card {
      background: #04040a;
      padding: 1.75rem;
      transition: background 0.2s;
    }
    .feat-card:hover { background: rgba(255,255,255,0.02); }
    .feat-icon {
      width: 36px; height: 36px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; margin-bottom: 1rem;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
    }
    .feat-card h3 { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.4rem; color: #fff; }
    .feat-card p { font-size: 0.85rem; color: rgba(255,255,255,0.38); line-height: 1.6; }

    /* links section */
    .links-section {
      max-width: 900px; margin: 0 auto;
      padding: 2rem 2rem 7rem;
    }
    .links-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 0.75rem; margin-top: 2rem;
    }
    .link-card {
      padding: 1.1rem 1.3rem;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      background: rgba(255,255,255,0.02);
      display: flex; align-items: center; gap: 10px;
      font-size: 0.9rem; font-weight: 500;
      transition: border-color 0.2s, background 0.2s, transform 0.2s;
      color: rgba(255,255,255,0.7);
    }
    .link-card:hover { border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); transform: translateY(-2px); color: #fff; }
    .link-icon { font-size: 1.1rem; }

    /* CTA footer */
    .cta-section {
      max-width: 900px; margin: 0 auto;
      padding: 2rem 2rem 8rem;
      text-align: center;
    }
    .cta-box {
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 4rem 2rem;
      background: rgba(255,255,255,0.02);
      position: relative; overflow: hidden;
    }
    .cta-box h2 {
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 700; letter-spacing: -1px;
      margin-bottom: 1rem; color: #fff;
    }
    .cta-box p { color: rgba(255,255,255,0.4); margin-bottom: 2rem; }

    /* footer */
    footer {
      text-align: center; padding: 2rem;
      font-size: 0.8rem; color: rgba(255,255,255,0.2);
      border-top: 1px solid rgba(255,255,255,0.05);
      position: relative; z-index: 1;
    }

    /* scroll reveal */
    .reveal {
      opacity: 0; transform: translateY(28px);
      transition: opacity 0.65s ease, transform 0.65s ease;
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 640px) {
      nav { padding: 1rem 1.25rem; }
      .nav-links { display: none; }
    }
  </style>
</head>
<body>

<script>
/* ================================================================
   CONFIG — edit everything here
   ================================================================ */
const CONFIG = {

  /* NAV */
  navName:      "jarrah",          /* logo text */
  navLinks: [                      /* remove any you don't want */
    { label: "About",   href: "#about" },
    { label: "Links",   href: "#links" },
    { label: "Contact", href: "#contact" },
  ],
  navCTA:       { label: "Jarrah", href: "#contact" },

  /* HERO */
  heroBadge:    "welcome",         /* small pill text above title, or "" to hide */
  heroStatic:   "Built for",       /* the non-cycling part of the big title */
  heroCycleWords: [                /* words that cycle through */
    "Everyone",
    "Jarrah",
    "You",
    "Today",
  ],
  heroSub:      "Jarrah",
  heroBtnPrimary:   { label: "About me", href: "#about" },
  heroBtnSecondary: { label: "Links", href: "#links" },

  /* HERO IMAGES (paste direct image URLs, or leave array empty to hide) */
  heroImages: [
    /* { url: "https://your-image-url.com/photo.jpg" }, */
  ],

  /* ACCENT / GLOW COLOURS */
  accentColor:  "#7c5cfc",         /* main accent (buttons, glow, etc) */
  accent2Color: "#06b6d4",         /* second orb colour */

  /* ABOUT */
  aboutLabel:   "About",
  aboutTitle:   "Hey, I'm Jarrah.",
  aboutText:    `I'm a <strong>designer and developer</strong> based in Australia.
                 I like building things for the web, listening to music, and staying up too late.`,

  /* FEATURE CARDS (small cards below about — describe yourself, your skills, whatever) */
  features: [
    { icon: "✦", title: "Design",    desc: "I care about how things look and feel." },
    { icon: "⌨", title: "Code",      desc: "I build stuff for the web." },
    { icon: "♪", title: "Music",     desc: "Always listening to something." },
  ],

  /* LINKS */
  linksLabel: "Find me",
  linksTitle: "Links & socials",
  links: [
    { icon: "🐙", label: "GitHub",    url: "https://github.com" },
    { icon: "🐦", label: "Twitter",   url: "https://twitter.com" },
    { icon: "📸", label: "Instagram", url: "https://instagram.com" },
    { icon: "💬", label: "Discord",   url: "https://discord.com" },
  ],

  /* CONTACT / CTA */
  ctaTitle:   "Want to reach out?",
  ctaSub:     "My inbox is open.",
  ctaEmail:   "hello@jarrah.lol",

  /* FOOTER */
  footerText: "jarrah.lol",
};
/* ================================================================
   END CONFIG
   ================================================================ */
</script>

<!-- bg -->
<div class="grid-bg"></div>
<div class="orb orb1" id="orb1"></div>
<div class="orb orb2" id="orb2"></div>

<!-- nav -->
<nav>
  <div class="nav-logo" id="nav-logo"></div>
  <div class="nav-links" id="nav-links"></div>
  <a class="nav-cta" id="nav-cta" href="#"></a>
</nav>

<!-- hero -->
<div class="hero">
  <div class="hero-badge" id="hero-badge" style="display:none">
    <div class="badge-dot" id="badge-dot"></div>
    <span id="badge-text"></span>
  </div>
  <h1>
    <span class="static" id="hero-static"></span><br>
    <span class="cycle-wrap" id="cycle-wrap"></span>
  </h1>
  <p class="hero-sub" id="hero-sub"></p>
  <div class="hero-btns">
    <a class="btn btn-primary" id="btn-primary" href="#"></a>
    <a class="btn btn-ghost"   id="btn-secondary" href="#"></a>
  </div>
  <div class="images-strip" id="images-strip"></div>
</div>

<div class="divider"></div>

<!-- about -->
<section class="about reveal" id="about">
  <p class="section-label" id="about-label"></p>
  <h2 id="about-title"></h2>
  <p class="about-body" id="about-body"></p>
</section>

<div class="features reveal" id="features"></div>

<div class="divider" style="max-width:900px;margin:0 auto"></div>

<!-- links -->
<section class="links-section reveal" id="links">
  <p class="section-label" id="links-label"></p>
  <h2 style="font-size:clamp(1.8rem,4vw,3rem);font-weight:700;letter-spacing:-1.5px;color:#fff" id="links-title"></h2>
  <div class="links-grid" id="links-grid"></div>
</section>

<div class="divider" style="max-width:900px;margin:0 auto"></div>

<!-- cta -->
<section class="cta-section reveal" id="contact">
  <div class="cta-box">
    <div class="cta-glow" id="cta-glow" style="position:absolute;inset:0;pointer-events:none;border-radius:20px;opacity:0.12;filter:blur(60px);"></div>
    <h2 id="cta-title"></h2>
    <p id="cta-sub"></p>
    <a class="btn btn-primary" id="cta-btn" href="#"></a>
  </div>
</section>

<footer id="footer"></footer>

<script>
  /* apply accent colours */
  document.getElementById('orb1').style.background = CONFIG.accentColor;
  document.getElementById('orb2').style.background = CONFIG.accent2Color;
  document.getElementById('cta-glow').style.background = CONFIG.accentColor;
  document.documentElement.style.setProperty('--accent', CONFIG.accentColor);
  document.documentElement.style.setProperty('--accent2', CONFIG.accent2Color);

  /* nav */
  const navLogo = document.getElementById('nav-logo');
  navLogo.innerHTML = CONFIG.navName + '<span>.</span>';
  const navLinksEl = document.getElementById('nav-links');
  CONFIG.navLinks.forEach(l => {
    navLinksEl.innerHTML += `<a href="${l.href}">${l.label}</a>`;
  });
  const navCTA = document.getElementById('nav-cta');
  navCTA.textContent = CONFIG.navCTA.label;
  navCTA.href = CONFIG.navCTA.href;

  /* badge */
  if (CONFIG.heroBadge) {
    const badge = document.getElementById('hero-badge');
    badge.style.display = 'inline-flex';
    document.getElementById('badge-dot').style.background = CONFIG.accentColor;
    document.getElementById('badge-text').textContent = CONFIG.heroBadge;
  }

  /* hero static text */
  document.getElementById('hero-static').textContent = CONFIG.heroStatic;
  document.getElementById('hero-sub').textContent = CONFIG.heroSub;

  /* cycle words */
  const cycleWrap = document.getElementById('cycle-wrap');
  cycleWrap.style.color = CONFIG.accentColor;
  CONFIG.heroCycleWords.forEach((w, i) => {
    const span = document.createElement('span');
    span.className = 'cycle-word' + (i === 0 ? ' active' : '');
    span.textContent = w;
    cycleWrap.appendChild(span);
  });
  /* set width to widest word */
  const widths = CONFIG.heroCycleWords.map(w => w.length);
  cycleWrap.style.minWidth = Math.max(...widths) + 'ch';

  let current = 0;
  setInterval(() => {
    const words = cycleWrap.querySelectorAll('.cycle-word');
    words[current].classList.remove('active');
    words[current].classList.add('exit');
    setTimeout(() => words[current].classList.remove('exit'), 450);
    current = (current + 1) % words.length;
    words[current].classList.add('active');
  }, 2200);

  /* hero buttons */
  const btnP = document.getElementById('btn-primary');
  btnP.textContent = CONFIG.heroBtnPrimary.label;
  btnP.href = CONFIG.heroBtnPrimary.href;
  btnP.style.background = CONFIG.accentColor;

  const btnS = document.getElementById('btn-secondary');
  btnS.textContent = CONFIG.heroBtnSecondary.label;
  btnS.href = CONFIG.heroBtnSecondary.href;

  /* hero images */
  const strip = document.getElementById('images-strip');
  if (CONFIG.heroImages && CONFIG.heroImages.length > 0) {
    CONFIG.heroImages.forEach(img => {
      strip.innerHTML += `<img class="strip-img" src="${img.url}" alt="" />`;
    });
  } else {
    strip.style.display = 'none';
  }

  /* about */
  document.getElementById('about-label').textContent = CONFIG.aboutLabel;
  document.getElementById('about-label').style.color = CONFIG.accentColor;
  document.getElementById('about-title').textContent = CONFIG.aboutTitle;
  document.getElementById('about-body').innerHTML = CONFIG.aboutText;

  /* features */
  const featGrid = document.getElementById('features');
  CONFIG.features.forEach(f => {
    featGrid.innerHTML += `
      <div class="feat-card">
        <div class="feat-icon">${f.icon}</div>
        <h3>${f.title}</h3>
        <p>${f.desc}</p>
      </div>`;
  });

  /* links */
  document.getElementById('links-label').textContent = CONFIG.linksLabel;
  document.getElementById('links-label').style.color = CONFIG.accentColor;
  document.getElementById('links-title').textContent = CONFIG.linksTitle;
  const linksGrid = document.getElementById('links-grid');
  CONFIG.links.forEach(l => {
    linksGrid.innerHTML += `
      <a class="link-card" href="${l.url}" target="_blank" rel="noopener">
        <span class="link-icon">${l.icon}</span>${l.label}
      </a>`;
  });

  /* cta */
  document.getElementById('cta-title').textContent = CONFIG.ctaTitle;
  document.getElementById('cta-sub').textContent = CONFIG.ctaSub;
  const ctaBtn = document.getElementById('cta-btn');
  ctaBtn.textContent = CONFIG.ctaEmail;
  ctaBtn.href = 'mailto:' + CONFIG.ctaEmail;
  ctaBtn.style.background = CONFIG.accentColor;

  /* footer */
  document.getElementById('footer').textContent = '© ' + new Date().getFullYear() + ' ' + CONFIG.footerText;
  document.title = CONFIG.navName;

  /* scroll reveal */
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); } });
  }, { threshold: 0.1 });
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>
</body>
</html>
